<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f8f1e7, #e9dccb);
  color: #1a1a1a;
  text-align: center;
}

/* container */
.container {
  margin-top: 50px;
  padding-bottom: 40px;
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* logo */
.logo {
  width: 300px;
  margin-bottom: 20px;
  filter: drop-shadow(0 6px 15px rgba(0,0,0,0.2));
}

/* title */
h1 {
  color: #D4AF37;
  letter-spacing: 2px;
  margin-bottom: 30px;
}

/* buttons */
.link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  width: 85%;
  max-width: 340px;
  margin: 12px auto;
  padding: 15px;

  text-decoration: none;
  color: black;

  background: linear-gradient(45deg, #D4AF37, #FFD700);
  border-radius: 30px;

  font-weight: bold;
  transition: 0.3s;
}

.link:hover {
  transform: scale(1.06);
}

/* icons */
.icon {
  width: 22px;
  height: 22px;
}
</style>

</head>
